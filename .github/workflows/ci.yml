# Lunar Solar Simulator - CI/CD Pipeline
# Runs tests, linting, and builds on every push and PR

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # Backend Tests
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./lunar-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: './lunar-backend/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting with Ruff
        run: |
          pip install ruff
          ruff check . --ignore E501

      - name: Run type checking with mypy
        run: |
          pip install mypy
          mypy --ignore-missing-imports services/ models/ || true

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --cov=services --cov=models --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./lunar-backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # Frontend Tests
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./lunar-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './lunar-frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint || true

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000
          VITE_WS_URL: ws://localhost:8000

  # Docker Build Test
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./lunar-backend
          push: false
          tags: lunar-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./lunar-frontend
          push: false
          tags: lunar-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Integration Test (optional - runs docker-compose)
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services
        run: |
          docker-compose up -d --build
          sleep 30  # Wait for services to start

      - name: Test backend health
        run: |
          curl -f http://localhost:8000/health || exit 1

      - name: Test frontend health
        run: |
          curl -f http://localhost:80/health || exit 1

      - name: Run API test
        run: |
          curl -X POST http://localhost:8000/simulate \
            -H "Content-Type: application/json" \
            -d '{"ring_width_km": 50, "panel_efficiency": 0.22, "transmission_type": "microwave", "num_ground_stations": 5, "simulation_hours": 24}' \
            | jq .total_energy_generated_gw

      - name: Stop services
        if: always()
        run: docker-compose down

  # Deploy (placeholder - customize for your deployment target)
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "Deployment would happen here"
          echo "Configure your deployment target (Vercel, Railway, AWS, etc.)"
